name: Slumber
options:
  bundleIdPrefix: com.adriaromero
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "17.0"
    watchOS: "7.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic

targets:

  # ── iOS App ───────────────────────────────────────────────────────────────
  Slumber:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: Slumber-Info.plist
      properties:
        CFBundleDisplayName: Slumber
        NSHealthShareUsageDescription: "Slumber reads heart rate to analyze your sleep quality."
        NSHealthUpdateUsageDescription: "Slumber saves your sleep stages to Apple Health."
        UILaunchScreen: {}
    entitlements:
      path: Slumber.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hey.adria.slumber
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentBlue
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Views
      - path: Assets.xcassets
    # Watch dependency removed until phone install is confirmed working
    # dependencies:
    #   - target: SlumberWatch
    #     embed: true
    #     codeSign: true

  # ── watchOS App ───────────────────────────────────────────────────────────
  SlumberWatch:
    type: application
    platform: watchOS
    deploymentTarget: "7.0"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Slumber
        WKCompanionAppBundleIdentifier: com.hey.adria.slumber
        NSMotionUsageDescription: "Slumber uses wrist motion to detect sleep stages."
        NSHealthShareUsageDescription: "Slumber reads heart rate and workout data."
        NSHealthUpdateUsageDescription: "Slumber saves a workout session to maintain background execution."
        UIBackgroundModes:
          - workout-processing
    entitlements:
      path: WatchApp/SlumberWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hey.adria.slumber.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentBlue
    sources:
      - path: WatchApp
      - path: Assets.xcassets
